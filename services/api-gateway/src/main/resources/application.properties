# Service Configuration
spring.application.name=api-gateway
server.port=8040

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Gateway Discovery
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Gateway Routes
spring.cloud.gateway.routes[0].id=owner-service
spring.cloud.gateway.routes[0].uri=lb://owner-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/owners/**

spring.cloud.gateway.routes[1].id=admin-service
spring.cloud.gateway.routes[1].uri=lb://admin-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[2].id=auth-server
spring.cloud.gateway.routes[2].uri=lb://auth-server
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**

# CORS Configuration (from environment variable)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.use-root-path=true

# Logging
logging.level.root=WARN
logging.level.org.springframework.cloud.gateway=WARN
logging.level.org.springframework.cloud=WARN
logging.level.org.springframework.boot.actuate=WARN
logging.level.org.springframework.security=WARN