services:
  # Eureka Service Discovery Server
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SERVER_PORT=8761
    networks:
      - playo-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Server
  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    container_name: auth-server
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      SERVER_PORT: 8081
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    networks:
      - playo-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8081/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    develop:
      watch:
        - path: ./auth-server/src
          target: /app/src
          action: sync
        - path: ./auth-server/pom.xml
          action: rebuild

  # API Gateway
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8040:8040"
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8040
      - SPRING_PROFILES_ACTIVE=docker
      - eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
      - cors.allowed-origins=http://localhost:5173,https://7l8584mh-5173.inc1.devtunnels.ms
    networks:
      - playo-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8040/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    develop:
      watch:
        - path: ./api-gateway/src
          target: /app/src
          action: sync
        - path: ./api-gateway/pom.xml
          action: rebuild

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-admin}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - playo-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-admin}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - playo-network
    command: redis-server --requirepass ${REDIS_PASSWORD:-admin}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-admin}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  playo-network:
    driver: bridge

volumes:
  postgres_data:
