spring.application.name=auth-server
server.port=${SERVER_PORT:8040}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_HOSTNAME:auth-server}

spring.security.user.name=admin
spring.security.user.password=admin

# Seeded admin account (created once if not present in DB)
app.admin.email=${APP_ADMIN_EMAIL:admin@playo.com}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.admin.name=${APP_ADMIN_NAME:Playo Admin}
app.admin.phone=${APP_ADMIN_PHONE:9999999999}

# Redis
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:admin}
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=false

# DB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}?sslmode=${DB_SSL_MODE}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_NAME}
cloudinary.api-key=${CLOUDINARY_API}
cloudinary.api-secret=${CLOUDINARY_SECRET}

spring.servlet.multipart.max-file-size: 5MB
spring.servlet.multipart.max-request-size: 5MB

# Swagger/OpenAPI Documentation
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.groups.enabled=true

# Logging
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.com.sportify=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.boot.actuate=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.data=WARN

# Email Configuration for Password Reset
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Thymeleaf Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Application Settings
app.email.from=${MAIL_FROM:noreply@playo.com}
app.password-reset.token-expiry-hours=1
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Debugging
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
