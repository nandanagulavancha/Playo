spring.application.name=owner-service
server.port=${SERVER_PORT:8031}

# Eureka Client
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_HOSTNAME:owner-service}

spring.security.user.name=admin
spring.security.user.password=admin

# JWT
app.jwt.secret=${JWT_SECRET:your_super_secret_key_that_is_at_least_256_bits_long}

# Razorpay Payment Gateway
# Test Mode Credentials (replace with your actual credentials)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_your_key_id}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:your_key_secret}

# DB
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}/${DB_NAME:playo}?sslmode=${DB_SSL_MODE:disable}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Redis Cache
spring.cache.type=redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:admin}
spring.data.redis.timeout=2s

# Entity Scanning - Include common-models
spring.jpa.properties.hibernate.show_sql=false

# Logging
logging.level.root=WARN
logging.level.com.pm=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.boot.actuate=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.data=WARN

# More detailed error logging
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=DEBUG
# Actuator
management.endpoints.web.exposure.include=health,info
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.show-details=when-authorized
